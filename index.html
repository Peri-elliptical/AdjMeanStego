<!DOCTYPE html>
<html>
    <head>
        <meta charset="UTF-8">
        <title>AdjMeanStego</title>
    </head> 
    <body>
        <h1 style="text-align: center;">Adjacent Mean Steganography</h1>

        Enter the Cover Image: <input type="file" id="input_image" name="input_image" required><br><br>
        
        Message to Hide:<br>
        <textarea id="message" name="message" rows="4" cols="50" required></textarea><br><br>
        
        <button onclick="submitForm()">Embed Message</button><br><br>
        Stego Image: <br>
        <p id="output"></p>

        <img id="result_image" src="" alt="Result will appear here">
        <script>
        async function submitForm() {
            const formData = new FormData();
            formData.append('input_image', document.getElementById('input_image').files[0]);
            formData.append('message', document.getElementById('message').value);

            const response = await fetch('/embed', {
                method: 'POST',
                body: formData
            });

            const result = await response.json();
            document.getElementById('output').innerText = result.status;
            document.getElementById('result_image').src = 'data:image/png;base64,' + result.image;
        }
        </script>
    </body>
</html>
